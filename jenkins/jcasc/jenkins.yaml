jenkins:
  systemMessage: "Minimal Jenkins in Docker managed by JCasC"
  numExecutors: 1
  mode: NORMAL
  nodes:
    - permanent:
        name: "${FLUTTER_AGENT_NAME}"
        nodeDescription: "Flutter agent running in Docker Compose"
        remoteFS: "${FLUTTER_AGENT_REMOTE_FS}"
        numExecutors: 1
        labelString: "${FLUTTER_AGENT_LABELS}"
        mode: NORMAL
        retentionStrategy: "always"
        launcher:
          sSHLauncher:
            host: "${FLUTTER_AGENT_HOST}"
            port: 22
            credentialsId: "${FLUTTER_AGENT_CREDENTIALS_ID}"
            launchTimeoutSeconds: 60
            maxNumRetries: 10
            retryWaitTime: 15
            sshHostKeyVerificationStrategy: "nonVerifyingKeyVerificationStrategy"
  securityRealm:
    local:
      allowsSignup: true
      users:
        - id: "${JENKINS_ADMIN_ID}"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - basicSSHUserPrivateKey:
              scope: GLOBAL
              id: "${SHARED_LIBRARY_CREDENTIALS_ID}"
              username: "${SHARED_LIBRARY_SSH_USERNAME}"
              description: "SSH deploy key for Jenkins shared library"
              privateKeySource:
                directEntry:
                  privateKey: "${readFile:${SHARED_LIBRARY_SSH_PRIVATE_KEY_PATH}}"
          - basicSSHUserPrivateKey:
              scope: GLOBAL
              id: "${FLUTTER_AGENT_CREDENTIALS_ID}"
              username: "${FLUTTER_AGENT_SSH_USERNAME}"
              description: "SSH key for the Flutter Jenkins agent"
              privateKeySource:
                directEntry:
                  privateKey: "${readFile:${SHARED_LIBRARY_SSH_PRIVATE_KEY_PATH}}"

unclassified:
  location:
    url: "${JENKINS_URL}"
  globalLibraries:
    libraries:
      - name: "${SHARED_LIBRARY_NAME}"
        defaultVersion: "${SHARED_LIBRARY_DEFAULT_BRANCH}"
        implicit: false
        allowVersionOverride: true
        includeInChangesets: false
        retriever:
          modernSCM:
            scm:
              gitSource:
                remote: "${SHARED_LIBRARY_REPOSITORY_URL}"
                credentialsId: "${SHARED_LIBRARY_CREDENTIALS_ID}"

security:
  gitHostKeyVerificationConfiguration:
    sshHostKeyVerificationStrategy: "knownHostsFileVerificationStrategy"
